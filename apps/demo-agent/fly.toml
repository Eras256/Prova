app = "prova-demo-agent"
primary_region = "dfw"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  INTERVAL_MS = "60000"
  PORT = "8080"

# El agente no expone API pública; solo un health check para que Fly lo mantenga vivo 24/7.
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
