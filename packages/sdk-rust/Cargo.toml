[package]
name = "prova-agent-sdk"
version = "0.1.1"
edition = "2021"
description = "Behavior attestation SDK for AI agents on Solana — wrap any agent action in a cryptographic receipt"
license = "Apache-2.0"
repository = "https://github.com/Eras256/Prova"
homepage = "https://www.theprova.xyz"
documentation = "https://docs.rs/prova-agent-sdk"
readme = "README.md"
keywords = ["solana", "ai-agents", "attestation", "cryptography", "ed25519"]
categories = ["cryptography", "api-bindings"]

[dependencies]
solana-sdk = "2.1"
solana-client = "2.1"
borsh = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
ed25519-dalek = "2"
thiserror = "2"
bs58 = "0.5"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

[[example]]
name = "test_devnet"
path = "examples/test_devnet.rs"

