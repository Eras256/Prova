[package]
name = "prova-sdk"
version = "0.1.0"
edition = "2021"
description = "Behavior attestation SDK for AI agents on Solana"
license = "Apache-2.0"
repository = "https://github.com/prova-io/prova"

[dependencies]
solana-sdk = "2.1"
solana-client = "2.1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
thiserror = "1"
anyhow = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
