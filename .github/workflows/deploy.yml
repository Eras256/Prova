name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@prova/web build
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl secrets set DATABASE_URL="${{ secrets.DATABASE_URL }}" HELIUS_API_KEY="${{ secrets.HELIUS_API_KEY }}" HELIUS_LASERSTREAM_URL="${{ secrets.HELIUS_LASERSTREAM_URL }}" API_KEY_SALT="${{ secrets.API_KEY_SALT }}" X402_TREASURY_PUBKEY="${{ secrets.X402_TREASURY_PUBKEY }}" --app prova-api || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --app prova-api --remote-only
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-indexer:
    name: Deploy Indexer to Fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl secrets set DATABASE_URL="${{ secrets.DATABASE_URL }}" HELIUS_API_KEY="${{ secrets.HELIUS_API_KEY }}" HELIUS_LASERSTREAM_URL="${{ secrets.HELIUS_LASERSTREAM_URL }}" --app prova-indexer || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --app prova-indexer --remote-only
        working-directory: apps/indexer
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
