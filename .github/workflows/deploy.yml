name: Deploy

on:
  push:
    branches: [main]

# Nota: la API y el indexer de producción se despliegan desde el repo privado.
# Este repo (showroom) contiene stubs de esos servicios — desplegarlos sobre
# las apps reales de Fly las rompería, por eso aquí solo se despliega el web.
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: typecheck
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets['VERCEL_TOKEN'] }}
        env:
          VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}
