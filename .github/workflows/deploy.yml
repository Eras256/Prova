name: Deploy

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: typecheck
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets['VERCEL_TOKEN'] }}
        env:
          VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: typecheck
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-indexer:
    name: Deploy Indexer to Fly.io
    runs-on: ubuntu-latest
    needs: typecheck
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/indexer/fly.toml --dockerfile apps/indexer/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
